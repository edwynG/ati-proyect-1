<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" sizes="32x32" href="../icon/cropped-logonuevo-32x32.png">
    <link rel="icon" sizes="192x192" href="../icon/cropped-logonuevo-192x192.png">
    <title>Edwyn Guzmán</title>
    <link rel="stylesheet" href="../css/style.css">
    <script type="text/javascript" src="./data/index.json" defer></script>
    <script type="text/javascript" src="./js/profile.js" defer></script>

</head>

<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-container-icon">
                <h1 class="icono" id="icon-text"></h1>
            </div>

            <div class="nav-container-search">
                <div class="search-box">
                    <input type="text" placeholder="" class="search-input" id="search-input">
                    <button class="search-button" id="search-button"></button>
                </div>
            </div>

            <div class="nav-container-user">
                <div class="user-box" id="user-box">
                    <img src="./icon/userIcon.svg" alt="User Icon" class="user-icon" id="user-icon">
                </div>

                <div class="user-menu">
                    <img src="./icon/menuIcon.svg" alt="User Icon Menu" class="user-menu-icon">
                </div>
            </div>
        </nav>
    </header>
    <section class="profile-container" id="profile-container">

    </section>
    <section class="home-container" id="container-search-list">

    </section>
    <footer class="footer">
        <p id="footer-text"></p>
    </footer>
</body>

</html>
